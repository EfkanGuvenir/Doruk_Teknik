<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doruk Teknik</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(64px, 12vw, 180px);
      font-weight: 800;
      letter-spacing: 2px;
      color: #000000;
      line-height: 1;
    }

    p {
      margin: 20px 0 0;
      font-size: clamp(28px, 4vw, 56px);
      color: #222222;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DORUK TEKNİK</h1>
    <p>0552 207 2057</p>
  </div>
</body>
</html>
